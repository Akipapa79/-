<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SEISIN Dashboard</title>

<style>
* { box-sizing: border-box; }

body {
  margin:0;
  font-family: "Segoe UI", Arial;
  background: linear-gradient(135deg,#eef2f7,#e4ecf7);
}

/* 헤더 */
header {
  background: linear-gradient(135deg,#0f2f5f,#2563eb);
  color:white;
  padding:24px 36px;
  font-size:22px;
  font-weight:bold;
}

/* 전체 */
.wrapper {
  max-width:1400px;
  margin:auto;
  padding:24px;
}

/* 상단 */
.grid {
  display:grid;
  grid-template-columns: 360px 1fr;
  gap:20px;
}

/* 카드 */
.card {
  background:white;
  border-radius:16px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.card h2 {
  margin-bottom:14px;
  color:#0f2f5f;
}

/* 공지 */
.notice li {
  padding:10px 0;
  border-bottom:1px solid #eee;
}

.notice li:last-child { border:none; }

.date {
  float:right;
  font-size:12px;
  color:#9ca3af;
}

/* 버튼 */
.tabs {
  margin-bottom:10px;
}

button {
  padding:8px 14px;
  border:none;
  border-radius:8px;
  margin-right:6px;
  background:#e5e7eb;
  cursor:pointer;
}

button.active {
  background:#2563eb;
  color:white;
}

/* iframe */
iframe {
  width:100%;
  height:340px;
  border-radius:10px;
  border:1px solid #ddd;
}

/* 매출 */
.sales {
  margin-top:20px;
}

.sales-grid {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:16px;
}

.sales-card {
  text-decoration:none;
  color:white;
  padding:20px;
  border-radius:14px;
  text-align:center;
  transition:0.2s;
}

.sales-card:hover {
  transform:translateY(-3px);
}

.sales-card:nth-child(1){background:linear-gradient(135deg,#2563eb,#60a5fa);}
.sales-card:nth-child(2){background:linear-gradient(135deg,#059669,#34d399);}
.sales-card:nth-child(3){background:linear-gradient(135deg,#7c3aed,#c084fc);}

/* 실적 */
.summary {
  margin-top:24px;
}

.summary-grid {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:12px;
}

.box {
  background:#f3f6fb;
  padding:14px;
  border-radius:10px;
  text-align:center;
}

.box strong {
  display:block;
  font-size:18px;
}

.box small {
  display:block;
  font-size:12px;
  color:#6b7280;
}

/* 그래프 */
.chart-box {
  margin-top:20px;
  padding:18px;
  background:#f8fafc;
  border-radius:14px;
}

.bar-row {
  display:grid;
  grid-template-columns:80px 1fr;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
  font-size:14px;
  font-weight:bold;
}

.bar-bg {
  position:relative;
  background:#e5e7eb;
  height:18px;
  border-radius:999px;
}

.bar-2024 {
  position:absolute;
  height:100%;
  background:#9ca3af;
  border-radius:999px;
  opacity:0.7;
}

.bar-2025 {
  position:absolute;
  height:100%;
  background:linear-gradient(90deg,#2563eb,#60a5fa);
  border-radius:999px;
}

/* 색상 */
.bar-2025.green { background:linear-gradient(90deg,#059669,#34d399); }
.bar-2025.purple { background:linear-gradient(90deg,#7c3aed,#c084fc); }
.bar-2025.orange { background:linear-gradient(90deg,#ea580c,#facc15); }

.bar-2024.green { background:#6ee7b7; }
.bar-2024.purple { background:#c4b5fd; }
.bar-2024.orange { background:#fdba74; }

</style>

<script>
function showWork(type){
  document.getElementById("osaka").style.display = type==="osaka"?"block":"none";
  document.getElementById("kyushu").style.display = type==="kyushu"?"block":"none";

  document.getElementById("btn1").classList.toggle("active", type==="osaka");
  document.getElementById("btn2").classList.toggle("active", type==="kyushu");
}
</script>

</head>

<body>

<header>SEISIN 운영 대시보드</header>

<div class="wrapper">

<div class="grid">

<!-- 공지 -->
<div class="card">
  <h2>공지사항</h2>
  <ul class="notice">
    <li>4월 마감-테스트 <span class="date">04-30</span></li>
    <li>연휴 일정-테스트 <span class="date">04-28</span></li>
    <li>근무표 확인-테스트 <span class="date">04-25</span></li>
  </ul>
</div>

<!-- 근무 -->
<div class="card">
  <h2>근무현황</h2>

  <div class="tabs">
    <button id="btn1" class="active" onclick="showWork('osaka')">오사카</button>
    <button id="btn2" onclick="showWork('kyushu')">규슈</button>
  </div>

  <div id="osaka">
    <iframe src="https://docs.google.com/spreadsheets/d/1_9Yk87noVzaUfhNcp91p5Mc3LXpOJILq/edit?rtpof=true&gid=1684846876#gid=1684846876"></iframe>
  </div>

  <div id="kyushu" style="display:none;">
    <iframe src="https://docs.google.com/spreadsheets/d/18tUIu7JdoyQ-mnP37xWQTwzJCoP4B_SN/edit?gid=1684846876#gid=1684846876"></iframe>
  </div>
</div>

</div>

<!-- 매출 -->
<div class="card sales">
  <h2>매출현황</h2>

  <div class="sales-grid">
    <a class="sales-card" href="https://docs.google.com/spreadsheets/d/1VLv1fv0IH7rrdUEgFyh0_4nWLnB9OvgzAnsGYLFzEEY/edit?gid=862432400#gid=862432400" target="_blank">오사카</a>
    <a class="sales-card" href="https://docs.google.com/spreadsheets/d/1SVcGwvkbtm5zAg3iuzjpSrO48d3_CDCww-KsQPJ0UbA/edit?gid=975850320#gid=975850320" target="_blank">규슈</a>
    <a class="sales-card" href="https://docs.google.com/spreadsheets/d/1RXXBcNKWi0WRNj_fH5DUlzKRXVz1tEYE7aJA-7i5slM/edit?gid=975850320#gid=975850320" target="_blank">동경</a>
  </div>
</div>

<!-- 실적 -->
<div class="card summary">
  <h2>2024 & 2025 실적</h2>

  <div class="summary-grid">
    <div class="box">단체수<strong>2025: 2,938</strong><small>2024: 4,003</small></div>
    <div class="box">인원<strong>2025: 63,182</strong><small>2024: 85,775</small></div>
    <div class="box">매출<strong>2025: 13억엔</strong><small>2024: 14억엔</small></div>
    <div class="box">매출이익<strong>2025: 1억4천만엔</strong><small>2024: 1억5천만엔</small></div>
  </div>

  <div class="chart-box">

    <div class="bar-row">
      <span>단체수</span>
      <div class="bar-bg">
        <div class="bar-2024" style="width:60%"></div>
        <div class="bar-2025" style="width:70%"></div>
      </div>
    </div>

    <div class="bar-row">
      <span>인원</span>
      <div class="bar-bg">
        <div class="bar-2024 green" style="width:65%"></div>
        <div class="bar-2025 green" style="width:75%"></div>
      </div>
    </div>

    <div class="bar-row">
      <span>매출</span>
      <div class="bar-bg">
        <div class="bar-2024 purple" style="width:70%"></div>
        <div class="bar-2025 purple" style="width:90%"></div>
      </div>
    </div>

    <div class="bar-row">
      <span>이익</span>
      <div class="bar-bg">
        <div class="bar-2024 orange" style="width:60%"></div>
        <div class="bar-2025 orange" style="width:80%"></div>
      </div>
    </div>

  </div>
</div>

</div>

</body>
</html>
