<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SEISHIN Group Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --main-blue: #1a4ba0; --accent-gold: #b2945e; --bg-gray: #f4f7f9; }
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background: var(--bg-gray); color: #333; }
        header { background: #fff; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--main-blue); position: sticky; top: 0; z-index: 1000; }
        .logo { display: flex; align-items: center; gap: 12px; font-size: 26px; font-weight: 600; color: var(--main-blue); }
        .container { display: grid; grid-template-columns: 320px 1fr 300px; gap: 25px; padding: 30px; max-width: 1800px; margin: 0 auto; }
        .card { background: #fff; border-radius: 16px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .tab-btn { padding: 12px 24px; border-radius: 10px; border: 2px solid #eee; background: #fff; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .tab-btn.active { background: var(--main-blue); color: #fff; border-color: var(--main-blue); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 12px; border: 1px solid #eee; font-size: 13px; }
        td { border: 1px solid #eee; padding: 15px; height: 100px; vertical-align: top; font-size: 12px; background: #fff; }
        .sales-link { display: flex; align-items: center; justify-content: space-between; background: #f8fafc; padding: 15px; border-radius: 12px; text-decoration: none; color: #333; margin-bottom: 10px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<header>
    <div class="logo"><i class="fa-solid fa-gem" style="color:var(--accent-gold)"></i> SEISHIN GROUP</div>
    <div style="font-weight:700; color:var(--main-blue)">2026. 04. 28 운영 대시보드</div>
</header>

<div class="container">
    <div class="left-col">
        <div class="card">
            <h3 style="color:var(--main-blue); border-bottom:2px solid var(--accent-gold); padding-bottom:10px;">📢 공지사항</h3>
            <p style="font-size:14px; line-height:1.8;">• 5월 연휴 업무 일정 안내<br>• 4월 실적 마감 안내 (4/30)<br>• 보안 가이드라인 준수 요청</p>
        </div>
    </div>

    <div class="center-col">
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <div class="tab-menu">
                    <button id="osaka-btn" class="tab-btn active" onclick="loadData('Osaka')">오사카 일정</button>
                    <button id="kyushu-btn" class="tab-btn" onclick="changeTab('Kyushu')">규슈 일정</button>
                </div>
                <h2 style="margin:0">4월 주요 일정</h2>
            </div>
            <div id="calendar-area">
                <table id="calendar-table">
                    <tbody id="schedule-content">
                        <tr><td colspan="7" style="text-align:center; padding:100px;">데이터를 불러오는 중입니다...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="right-col">
        <div class="card">
            <h3 style="color:var(--main-blue)">📈 매출현황 상세</h3>
            <a href="https://docs.google.com/spreadsheets/d/1VLv1fv0IH7rrdUEgFyh0_4nWLnB9OvgzAnsGYLFzEEY/" class="sales-link" target="_blank">오사카 본부 ↗</a>
            <a href="https://docs.google.com/spreadsheets/d/1SVcGwvkbtm5zAg3iuzjpSrO48d3_CDCww-KsQPJ0UbA/" class="sales-link" target="_blank">규슈 지사 ↗</a>
        </div>
    </div>
</div>

<script>
    // 홍대표님이 발급받으신 심장(GAS) URL입니다.
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwEXI69cQ1VTvjSs8qvcGTiCB7162Zz2h7OU3ei6A8r05ftFbYBddd-qqeZIULieLzEUQ/exec";

    async function loadData(region) {
        document.getElementById('osaka-btn').className = region === 'Osaka' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('kyushu-btn').className = region === 'Kyushu' ? 'tab-btn active' : 'tab-btn';
        
        const content = document.getElementById('schedule-content');
        content.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:100px;">실시간 데이터 동기화 중...</td></tr>';

        try {
            const response = await fetch(`${GAS_URL}?region=${region}`);
            const data = await response.json();
            
            let html = '';
            data.forEach((row, i) => {
                html += '<tr>';
                row.forEach(cell => {
                    if(i === 0) html += `<th style="background:#f8f9fa; padding:12px; border:1px solid #eee;">${cell}</th>`;
                    else html += `<td style="border:1px solid #eee; padding:15px; height:100px; vertical-align:top;">${cell.replace(/\n/g, '<br>')}</td>`;
                });
                html += '</tr>';
            });
            document.getElementById('calendar-table').innerHTML = html;
        } catch (error) {
            content.innerHTML = '<tr><td colspan="7" style="text-align:center; color:red;">시트 연동 실패! 배포 설정을 확인해주세요.</td></tr>';
        }
    }

    function changeTab(region) { loadData(region); }
    
    // 페이지 로딩 시 오사카 데이터 바로 실행
    window.onload = () => loadData('Osaka');
</script>

</body>
</html>
