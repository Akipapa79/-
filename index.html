<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SEISHIN Group Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --main-blue: #0f2f5f; --accent-blue: #2563eb; --accent-gold: #b2945e; --bg-gray: #f4f7f9; }
        body { margin: 0; font-family: "Segoe UI", Arial; background: var(--bg-gray); }
        header { background: linear-gradient(135deg, var(--main-blue), var(--accent-blue)); color: white; padding: 20px 30px; font-size: 22px; font-weight: bold; }
        .wrapper { max-width: 1500px; margin: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card h2 { margin-top: 0; color: var(--main-blue); font-size: 18px; border-left: 4px solid var(--accent-gold); padding-left: 10px; margin-bottom: 15px; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 8px; margin-right: 5px; background: #e5e7eb; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--accent-blue); color: white; }
        /* 시트가 들어갈 프레임 디자인 */
        .sheet-container { background: #fff; border: 1px solid #ddd; border-radius: 12px; overflow: hidden; height: 550px; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }
        /* 하단 매출 버튼 */
        .sales-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .sales-card { text-decoration: none; color: white; padding: 25px; border-radius: 14px; text-align: center; font-weight: bold; font-size: 18px; transition: 0.3s; }
        .osaka-bg { background: linear-gradient(135deg, #2563eb, #60a5fa); }
        .kyushu-bg { background: linear-gradient(135deg, #059669, #34d399); }
        .tokyo-bg { background: linear-gradient(135deg, #7c3aed, #c084fc); }
    </style>
</head>
<body>

<header><i class="fa-solid fa-building-columns"></i> SEISHIN 운영 대시보드</header>

<div class="wrapper">
    <div class="grid">
        <div class="card">
            <h2>공지사항</h2>
            <ul style="list-style:none; padding:0; line-height:2.2; font-size:14px;">
                <li style="border-bottom:1px solid #eee;">• 실시간 운영 현황 연동</li>
                <li style="border-bottom:1px solid #eee;">• 4월 마감 일정 안내</li>
                <li>• 동경 본부 통합 대시보드</li>
            </ul>
        </div>
        <div class="card">
            <h2>근무현황 (4월 Plan)</h2>
            <div style="margin-bottom: 15px;">
                <button id="b1" class="tab-btn active" onclick="show('osaka','b1')">오사카</button>
                <button id="b2" class="tab-btn" onclick="show('kyushu','b2')">규슈</button>
                <button id="b3" class="tab-btn" onclick="show('tokyo','b3')">동경</button>
            </div>
            <div class="sheet-container">
                <iframe id="osaka" class="active" src="https://docs.google.com/spreadsheets/d/1VLv1fv0IH7rrdUEgFyh0_4nWLnB9OvgzAnsGYLFzEEY/pubhtml?gid=1510344400&single=true&widget=false&headers=false&chrome=false&rm=minimal"></iframe>
                <iframe id="kyushu" src="https://docs.google.com/spreadsheets/d/1SVcGwvkbtm5zAg3iuzjpSrO48d3_CDCww-KsQPJ0UbA/pubhtml?gid=1510344400&single=true&widget=false&headers=false&chrome=false&rm=minimal"></iframe>
                <iframe id="tokyo" src="https://docs.google.com/spreadsheets/d/1W8vP9i1X1u8fNf5H8_vXzH7wB-uG6-tXkQ1e8zY1Zc/pubhtml?gid=1510344400&single=true&widget=false&headers=false&chrome=false&rm=minimal"></iframe>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>매출현황 (전체 시트 연결)</h2>
        <div class="sales-grid">
            <a class="sales-card osaka-bg" href="https://docs.google.com/spreadsheets/d/1VLv1fv0IH7rrdUEgFyh0_4nWLnB9OvgzAnsGYLFzEEY/" target="_blank">오사카 본부 ↗</a>
            <a class="sales-card kyushu-bg" href="https://docs.google.com/spreadsheets/d/1SVcGwvkbtm5zAg3iuzjpSrO48d3_CDCww-KsQPJ0UbA/" target="_blank">규슈 지사 ↗</a>
            <a class="sales-card tokyo-bg" href="https://docs.google.com/spreadsheets/d/1W8vP9i1X1u8fNf5H8_vXzH7wB-uG6-tXkQ1e8zY1Zc/" target="_blank">동경 본부 ↗</a>
        </div>
    </div>
</div>

<script>
    function show(id, btnId) {
        document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById(btnId).classList.add('active');
    }
</script>
</body>
</html>
