<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SEISHIN GROUP 통합 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { margin:0; font-family:'Noto Sans KR',sans-serif; background:linear-gradient(135deg,#e8eef6 0%,#f7f9fc 100%); color:#111827; }
        header { background:linear-gradient(135deg,#001f4d 0%,#003876 45%,#005bea 100%); padding:18px 38px; display:flex; align-items:center; gap:15px; color:white; font-size:25px; font-weight:800; border-bottom:4px solid #b2945e; box-shadow:0 8px 24px rgba(0,0,0,0.25); }
        header img { height:45px; background:white; border-radius:7px; padding:3px; }
        .container { max-width:1100px; margin:30px auto; padding:0 20px; }
        .top-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:20px; }
        .card { background:#ffffff; border-radius:20px; padding:28px; box-shadow:0 15px 35px rgba(15,23,42,0.15); border:1px solid #dbe4f0; }
        .card h2 { color:#0b2f5f; font-size:20px; margin:0 0 20px 0; display:flex; align-items:center; gap:12px; border-bottom:2px solid #e5edf7; padding-bottom:15px; font-weight:800; }
        .card h2 i { color:#b2945e; }
        .btn-grid { display:grid; gap:12px; }
        
        /* 박스 버튼 크기 축소, 글씨 확대, 뿌연 효과 완벽 제거 및 선명한 프리미엄 펄 입체감 */
        .link-btn {
            display:flex; align-items:center; justify-content:space-between;
            padding:14px 20px; /* 세로 padding 축소로 박스 크기 슬림화 */
            border-radius:12px; text-decoration:none; color:white;
            font-weight:800; font-size:20px; /* 글자 크기 대폭 확대 및 볼드 처리 */
            transition:0.25s ease;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.7); /* 글자 가독성 향상 */
            position: relative; overflow: hidden; /* 펄 효과를 위한 설정 */
        }
        
        /* 펄 입체 질감을 위한 하이라이트 추가 */
        .link-btn::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(to top right, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 100%);
            border-radius: 11px; pointer-events: none;
        }

        .link-btn i { font-size:18px; opacity:0.95; }
        .link-btn:hover { transform:translateY(-3px) scale(1.02); filter:brightness(1.15); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        /* 선명하고 뚜렷한 프리미엄 입체 그라데이션 컬러 */
        .col-blue, .hotel-top {
            background: linear-gradient(135deg, #002266 0%, #004dc7 35%, #9cc6ff 40%, #00308a 60%, #001f4d 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -6px 15px rgba(0,0,0,0.15), 0 8px 18px rgba(0,82,217,0.32);
        }
        .col-green, .hotel-bottom {
            background: linear-gradient(135deg, #004c38 0%, #00a379 35%, #a6f6df 40%, #00664d 60%, #002e1f 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -6px 15px rgba(0,0,0,0.15), 0 8px 18px rgba(0,143,104,0.3);
        }
        .col-purple {
            background: linear-gradient(135deg, #3a006d 0%, #a44dff 35%, #edccff 40%, #611bbe 60%, #1e0038 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -6px 15px rgba(0,0,0,0.15), 0 8px 18px rgba(123,34,217,0.3);
        }

        /* 호텔 블록 현황을 더 세련되게 배치한 그리드 */
        .hotel-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:15px; }

        @media(max-width:900px){
            .container{ max-width:100%; margin:20px auto; }
            .top-grid{ grid-template-columns:1fr; }
            .hotel-grid{ grid-template-columns:1fr; }
            header{ font-size:21px; padding:16px 20px; }
        }
    </style>
</head>
<body>
<header>
    <img src="SIT.jpg">
    <span>SEISHIN GROUP 통합 대시보드</span>
</header>
<div class="container">
    <div class="top-grid">
        <div class="card">
            <h2><i class="fa-solid fa-chart-line"></i> 1. 매출현황</h2>
            <div class="btn-grid">
                <a href="https://docs.google.com/spreadsheets/d/1VLv1fv0IH7rrdUEgFyh0_4nWLnB9OvgzAnsGYLFzEEY/edit?gid=1748778149#gid=1748778149" target="_blank" class="link-btn col-blue">
                    <span>오사카 매출현황</span>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
                <a href="https://docs.google.com/spreadsheets/d/1SVcGwvkbtm5zAg3iuzjpSrO48d3_CDCww-KsQPJ0UbA/edit?gid=722215197#gid=722215197" target="_blank" class="link-btn col-green">
                    <span>규슈 매출현황</span>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
                <a href="https://docs.google.com/spreadsheets/d/1RXXBcNKWi0WRNj_fH5DUlzKRXVz1tEYE7aJA-7i5slM/edit?gid=722215197#gid=722215197" target="_blank" class="link-btn col-purple">
                    <span>동경 매출현황</span>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
            </div>
        </div>
        <div class="card">
            <h2><i class="fa-solid fa-calendar-check"></i> 2. 근무현황</h2>
            <div class="btn-grid">
                <a href="https://docs.google.com/spreadsheets/d/1_9Yk87noVzaUfhNcp91p5Mc3LXpOJILq/edit?gid=1976745365#gid=1976745365" target="_blank" class="link-btn col-blue">
                    <span>오사카 근무현황</span>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
                <a href="https://docs.google.com/spreadsheets/d/1vKimTl2MaeLo4-zrsFeIWJOyhHPf7uH2/edit?rtpof=true&gid=1684846876#gid=1684846876" target="_blank" class="link-btn col-green">
                    <span>규슈 근무현황</span>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
            </div>
        </div>
        <div class="card">
            <h2><i class="fa-solid fa-hand-holding-dollar"></i> 3. 인센현황</h2>
            <div class="btn-grid">
                <a href="https://docs.google.com/spreadsheets/d/11giEDLNFNJe0ME6czK0yY7HAwgjOKxJJ/edit?pli=1&gid=331033276#gid=331033276" target="_blank" class="link-btn col-blue">
                    <span>이트래블 인센현황</span>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
                <a href="https://docs.google.com/spreadsheets/d/1sSXt8YckniAcmtDG0-QT_UdWWiuxx8Am/edit?pli=1&gid=1695092935#gid=1695092935" target="_blank" class="link-btn col-green">
                    <span>그외 인센현황</span>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
                <a href="https://docs.google.com/spreadsheets/d/1Ki1LMopEr8V8Jya6NmzZGpKLHHy3Hp1u/edit?gid=483904815#gid=483904815" target="_blank" class="link-btn col-purple">
                    <span>한국지사 인센현황</span>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
            </div>
        </div>
    </div>
    <div class="card">
        <h2><i class="fa-solid fa-hotel"></i> 4. 호텔블록현황</h2>
        <div class="hotel-grid">
            <a href="https://docs.google.com/spreadsheets/d/1o_oRouHav0Z5aMKWmgZBovg-KLZufQam8SzaR_JljR0/edit?gid=1597431311#gid=1597431311" target="_blank" class="link-btn hotel-top">
                <span>히노데호텔</span>
                <i class="fa-solid fa-hotel"></i>
            </a>
            <a href="https://docs.google.com/spreadsheets/d/1aflBDQqYBDW4SIWOrfquTUnRNceHQh8C/edit?rtpof=true&gid=1347907107#gid=1347907107" target="_blank" class="link-btn hotel-top">
                <span>WBF남바모토마치</span>
                <i class="fa-solid fa-hotel"></i>
            </a>
            <a href="https://docs.google.com/spreadsheets/d/1ENafFWMF2M8Cw3YRxgwRAxuNxh1FEQ6gJeniyNZo1mI/edit?gid=479650170#gid=479650170" target="_blank" class="link-btn hotel-top">
                <span>센타라라이프호텔</span>
                <i class="fa-solid fa-hotel"></i>
            </a>
            <a href="https://docs.google.com/spreadsheets/d/1PAiYsE1vC2Vf-wJ0rYem2RJnfaFM-D4s_93SvcYRhWo/edit?gid=619011903#gid=619011903" target="_blank" class="link-btn hotel-bottom">
                <span>비스윗호텔남바</span>
                <i class="fa-solid fa-hotel"></i>
            </a>
            <a href="https://docs.google.com/spreadsheets/d/1b7SUn0lInIy6VZsfdi-nZ0sIqM5iiqF4/edit?gid=1298837714#gid=1298837714" target="_blank" class="link-btn hotel-bottom">
                <span>오사카바인호텔</span>
                <i class="fa-solid fa-hotel"></i>
            </a>
            <a href="https://docs.google.com/spreadsheets/d/1cR2hLm6s0SmuADPTYo2jzpWLWbV0Io7C/edit?gid=205860888#gid=205860888" target="_blank" class="link-btn hotel-bottom">
                <span>아마네크호텔남바</span>
                <i class="fa-solid fa-hotel"></i>
            </a>
        </div>
    </div>
</div>
</body>
</html>
