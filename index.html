<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SEISHIN GROUP 통합 대시보드</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        body{
            margin:0;
            font-family:'Noto Sans KR',sans-serif;
            background:linear-gradient(135deg,#eef3f9 0%,#f8fafc 100%);
            color:#1e293b;
        }

        /* 헤더 */

        header{
            background:linear-gradient(135deg,#002b5c 0%,#003876 45%,#1d4ed8 100%);
            padding:18px 40px;
            display:flex;
            align-items:center;
            gap:15px;
            color:white;
            font-size:26px;
            font-weight:700;
            border-bottom:4px solid #b2945e;
            box-shadow:0 6px 18px rgba(0,0,0,0.15);
        }

        header img{
            height:45px;
            background:white;
            border-radius:6px;
            padding:3px;
        }

        /* 전체 */

        .container{
            max-width:1200px;
            margin:35px auto;
            padding:0 20px;
        }

        /* 상단 */

        .top-grid{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:20px;
            margin-bottom:22px;
        }

        /* 카드 */

        .card{
            background:rgba(255,255,255,0.96);
            border-radius:20px;
            padding:24px;
            box-shadow:0 12px 30px rgba(15,23,42,0.08);
            border:1px solid rgba(255,255,255,0.9);
        }

        .card h2{
            color:#0f2f5f;
            font-size:20px;
            margin:0 0 18px 0;
            display:flex;
            align-items:center;
            gap:10px;
            border-bottom:2px solid #eef2f7;
            padding-bottom:12px;
        }

        .card h2 i{
            color:#b2945e;
        }

        /* 버튼 */

        .btn-grid{
            display:grid;
            gap:12px;
        }

        .hotel-grid{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:14px;
        }

        .link-btn{
            position:relative;
            overflow:hidden;

            display:flex;
            align-items:center;
            justify-content:space-between;

            padding:16px 18px;
            border-radius:16px;

            text-decoration:none;
            color:white;
            font-weight:700;
            font-size:15px;

            transition:0.25s;
        }

        .link-btn::before{
            content:"";
            position:absolute;
            top:-50%;
            left:-30%;
            width:150%;
            height:220%;

            background:linear-gradient(
            120deg,
            rgba(255,255,255,0.05),
            rgba(255,255,255,0.30),
            rgba(255,255,255,0.05)
            );

            transform:rotate(15deg);
        }

        .link-btn span,
        .link-btn i{
            position:relative;
            z-index:2;
        }

        .link-btn:hover{
            transform:translateY(-4px) scale(1.02);
            filter:brightness(1.08);
        }

        /* ===== 컬러 ===== */

        /* 블루 */

        .col-blue{
            background:linear-gradient(145deg,#003b95 0%,#0066ff 45%,#4da3ff 100%);
            box-shadow:
            inset 0 1px 0 rgba(255,255,255,0.35),
            0 10px 22px rgba(0,102,255,0.35);
        }

        /* 그린 */

        .col-green{
            background:linear-gradient(145deg,#006b4f 0%,#00a878 45%,#4ee6b0 100%);
            box-shadow:
            inset 0 1px 0 rgba(255,255,255,0.35),
            0 10px 22px rgba(0,168,120,0.35);
        }

        /* 퍼플 */

        .col-purple{
            background:linear-gradient(145deg,#4c1d95 0%,#8b35ff 45%,#d07cff 100%);
            box-shadow:
            inset 0 1px 0 rgba(255,255,255,0.35),
            0 10px 22px rgba(139,53,255,0.35);
        }

        /* 호텔 위 */

        .hotel-top{
            background:linear-gradient(145deg,#003b95 0%,#0066ff 45%,#4da3ff 100%);
            box-shadow:
            inset 0 1px 0 rgba(255,255,255,0.35),
            0 10px 22px rgba(0,102,255,0.35);
        }

        /* 호텔 아래 */

        .hotel-bottom{
            background:linear-gradient(145deg,#006b4f 0%,#00a878 45%,#4ee6b0 100%);
            box-shadow:
            inset 0 1px 0 rgba(255,255,255,0.35),
            0 10px 22px rgba(0,168,120,0.35);
        }

        /* 반응형 */

        @media(max-width:900px){

            .top-grid{
                grid-template-columns:1fr;
            }

            .hotel-grid{
                grid-template-columns:1fr;
            }

            header{
                font-size:22px;
                padding:16px 22px;
            }
        }

    </style>
</head>

<body>

<header>
    <img src="SIT.jpg">
    <span>SEISHIN GROUP 통합 대시보드</span>
</header>

<div class="container">

    <!-- 상단 -->

    <div class="top-grid">

        <!-- 1 매출현황 -->

        <div class="card">

            <h2>
                <i class="fa-solid fa-chart-line"></i>
                1. 매출현황
            </h2>

            <div class="btn-grid">

                <a href="오사카매출URL"
                   target="_blank"
                   class="link-btn col-blue">

                    <span>오사카 매출현황</span>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>

                </a>

                <a href="규슈매출URL"
                   target="_blank"
                   class="link-btn col-green">

                    <span>규슈 매출현황</span>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>

                </a>

                <a href="동경매출URL"
                   target="_blank"
                   class="link-btn col-purple">

                    <span>동경 매출현황</span>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>

                </a>

            </div>

        </div>

        <!-- 2 근무현황 -->

        <div class="card">

            <h2>
                <i class="fa-solid fa-calendar-check"></i>
                2. 근무현황
            </h2>

            <div class="btn-grid">

                <a href="오사카근무URL"
                   target="_blank"
                   class="link-btn col-blue">

                    <span>오사카 근무현황</span>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>

                </a>

                <a href="규슈근무URL"
                   target="_blank"
                   class="link-btn col-green">

                    <span>규슈 근무현황</span>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>

                </a>

            </div>

        </div>

        <!-- 3 인센현황 -->

        <div class="card">

            <h2>
                <i class="fa-solid fa-hand-holding-dollar"></i>
                3. 인센현황
            </h2>

            <div class="btn-grid">

                <a href="https://docs.google.com/spreadsheets/d/11giEDLNFNJe0ME6czK0yY7HAwgjOKxJJ/edit?pli=1&gid=331033276#gid=331033276"
                   target="_blank"
                   class="link-btn col-blue">

                    <span>이트래블 인센현황</span>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>

                </a>

                <a href="https://docs.google.com/spreadsheets/d/1sSXt8YckniAcmtDG0-QT_UdWWiuxx8Am/edit?pli=1&gid=1695092935#gid=1695092935"
                   target="_blank"
                   class="link-btn col-green">

                    <span>그외 인센현황</span>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>

                </a>

                <a href="https://docs.google.com/spreadsheets/d/1Ki1LMopEr8V8Jya6NmzZGpKLHHy3Hp1u/edit?gid=483904815#gid=483904815"
                   target="_blank"
                   class="link-btn col-purple">

                    <span>한국지사 인센현황</span>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>

                </a>

            </div>

        </div>

    </div>

    <!-- 하단 -->

    <div class="card">

        <h2>
            <i class="fa-solid fa-hotel"></i>
            4. 호텔블록현황
        </h2>

        <div class="hotel-grid">

            <!-- 윗줄 -->

            <a href="https://docs.google.com/spreadsheets/d/1o_oRouHav0Z5aMKWmgZBovg-KLZufQam8SzaR_JljR0/edit?gid=1597431311#gid=1597431311"
               target="_blank"
               class="link-btn hotel-top">

                <span>히노데호텔</span>
                <i class="fa-solid fa-arrow-up-right-from-square"></i>

            </a>

            <a href="https://docs.google.com/spreadsheets/d/1aflBDQqYBDW4SIWOrfquTUnRNceHQh8C/edit?rtpof=true&gid=1347907107#gid=1347907107"
               target="_blank"
               class="link-btn hotel-top">

                <span>WBF남바모토마치</span>
                <i class="fa-solid fa-arrow-up-right-from-square"></i>

            </a>

            <a href="https://docs.google.com/spreadsheets/d/1ENafFWMF2M8Cw3YRxgwRAxuNxh1FEQ6gJeniyNZo1mI/edit?gid=479650170#gid=479650170"
               target="_blank"
               class="link-btn hotel-top">

                <span>센타라라이프호텔</span>
                <i class="fa-solid fa-arrow-up-right-from-square"></i>

            </a>

            <!-- 아랫줄 -->

            <a href="https://docs.google.com/spreadsheets/d/1PAiYsE1vC2Vf-wJ0rYem2RJnfaFM-D4s_93SvcYRhWo/edit?gid=619011903#gid=619011903"
               target="_blank"
               class="link-btn hotel-bottom">

                <span>비스윗호텔남바</span>
                <i class="fa-solid fa-arrow-up-right-from-square"></i>

            </a>

            <a href="https://docs.google.com/spreadsheets/d/1b7SUn0lInIy6VZsfdi-nZ0sIqM5iiqF4/edit?gid=1298837714#gid=1298837714"
               target="_blank"
               class="link-btn hotel-bottom">

                <span>오사카바인호텔</span>
                <i class="fa-solid fa-arrow-up-right-from-square"></i>

            </a>

            <a href="https://docs.google.com/spreadsheets/d/1cR2hLm6s0SmuADPTYo2jzpWLWbV0Io7C/edit?gid=205860888#gid=205860888"
               target="_blank"
               class="link-btn hotel-bottom">

                <span>아마네크호텔남바</span>
                <i class="fa-solid fa-arrow-up-right-from-square"></i>

            </a>

        </div>

    </div>

</div>

</body>
</html>
