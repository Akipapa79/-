<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SEISIN 운영 대시보드</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, "Noto Sans KR", sans-serif;
  background: #f3f6fb;
  color: #111827;
}

header {
  background: linear-gradient(135deg, #0b2f5b, #174ea6);
  color: white;
  padding: 22px 36px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  margin: 0;
  font-size: 24px;
  letter-spacing: -0.5px;
}

header span {
  font-size: 14px;
  opacity: 0.85;
}

.wrapper {
  max-width: 1400px;
  margin: 0 auto;
  padding: 28px;
}

.grid {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 22px;
}

.card {
  background: white;
  border-radius: 18px;
  padding: 22px;
  box-shadow: 0 8px 24px rgba(15, 47, 95, 0.08);
  border: 1px solid #e5eaf2;
}

.card h2 {
  margin: 0 0 18px;
  font-size: 20px;
  color: #0b2f5b;
}

.notice-list {
  list-style: none;
  padding: 0;
  margin: 0;
}

.notice-list li {
  padding: 13px 0;
  border-bottom: 1px solid #edf0f5;
  font-size: 15px;
  line-height: 1.5;
}

.notice-list li:last-child {
  border-bottom: none;
}

.date {
  float: right;
  color: #6b7280;
  font-size: 13px;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
}

button, .link-btn {
  border: none;
  background: #e8eef8;
  color: #0b2f5b;
  padding: 11px 18px;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
}

button.active {
  background: #2563eb;
  color: white;
}

iframe {
  width: 100%;
  height: 620px;
  border: 1px solid #dde5f0;
  border-radius: 14px;
  background: white;
}

.sales {
  margin-top: 22px;
}

.sales-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

.sales-card {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 16px;
  padding: 22px;
  text-align: center;
  text-decoration: none;
  color: #111827;
  transition: 0.15s;
}

.sales-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(15,47,95,0.12);
}

.sales-card strong {
  display: block;
  font-size: 22px;
  margin-bottom: 8px;
  color: #174ea6;
}

footer {
  text-align: center;
  color: #6b7280;
  font-size: 13px;
  padding: 22px;
}

@media (max-width: 900px) {
  .grid {
    grid-template-columns: 1fr;
  }

  .sales-grid {
    grid-template-columns: 1fr;
  }
}
</style>

<script>
function showWork(type) {
  document.getElementById("osakaWork").style.display = type === "osaka" ? "block" : "none";
  document.getElementById("kyushuWork").style.display = type === "kyushu" ? "block" : "none";

  document.getElementById("btnOsaka").classList.toggle("active", type === "osaka");
  document.getElementById("btnKyushu").classList.toggle("active", type === "kyushu");
}
</script>
</head>

<body>

<header>
  <h1>SEISIN 운영 대시보드</h1>
  <span>공지사항 · 근무현황 · 매출현황</span>
</header>

<div class="wrapper">

  <div class="grid">

    <section class="card">
      <h2>공지사항</h2>
      <ul class="notice-list">
        <li>4월 실적 마감 안내 <span class="date">04-30</span></li>
        <li>5월 연휴기간 근무 일정 확인 <span class="date">04-28</span></li>
        <li>오사카 / 규슈 근무현황 최신화 요청 <span class="date">04-25</span></li>
        <li>신규 상품 업데이트 확인 <span class="date">04-24</span></li>
      </ul>
    </section>

    <section class="card">
      <h2>근무현황</h2>

      <div class="tabs">
        <button id="btnOsaka" class="active" onclick="showWork('osaka')">오사카</button>
        <button id="btnKyushu" onclick="showWork('kyushu')">규슈</button>
      </div>

      <div id="osakaWork">
        <iframe src="https://docs.google.com/spreadsheets/d/1_9Yk87noVzaUfhNcp91p5Mc3LXpOJILq/edit?gid=1684846876#gid=1684846876"></iframe>
      </div>

      <div id="kyushuWork" style="display:none;">
        <iframe src="https://docs.google.com/spreadsheets/d/18tUIu7JdoyQ-mnP37xWQTwzJCoP4B_SN/edit?gid=1684846876#gid=1684846876"></iframe>
      </div>
    </section>

  </div>

  <section class="card sales">
    <h2>매출현황</h2>

    <div class="sales-grid">
      <a class="sales-card" href="https://docs.google.com/spreadsheets/d/1VLv1fv0IH7rrdUEgFyh0_4nWLnB9OvgzAnsGYLFzEEY/edit?gid=862432400#gid=862432400" target="_blank">
        <strong>오사카</strong>
        매출현황 열기
      </a>

      <a class="sales-card" href="https://docs.google.com/spreadsheets/d/1SVcGwvkbtm5zAg3iuzjpSrO48d3_CDCww-KsQPJ0UbA/edit?gid=975850320#gid=975850320" target="_blank">
        <strong>규슈</strong>
        매출현황 열기
      </a>

      <a class="sales-card" href="https://docs.google.com/spreadsheets/d/1RXXBcNKWi0WRNj_fH5DUlzKRXVz1tEYE7aJA-7i5slM/edit?gid=975850320#gid=975850320L" target="_blank">
        <strong>동경</strong>
        매출현황 열기
      </a>
    </div>
  </section>

</div>

<footer>
  © 2026 SEISIN. Internal Dashboard.
</footer>

</body>
</html>
